server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html; }
  # OCR assets: a missing file must 404 (NOT fall back to index.html), so a broken
  # deploy can never get a 200-HTML response cached at the CDN for these URLs.
  location /tess/ { try_files $uri =404; add_header Cache-Control "public, max-age=2592000"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
  location = /sw.js { add_header Cache-Control "no-cache"; }
  location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
}
